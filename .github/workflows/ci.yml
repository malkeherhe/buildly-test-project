name: Buildly Test Pipeline

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: backendPBL/projectBPL
        run: pip install -r requirements.txt

      - name: Security check
        working-directory: backendPBL/projectBPL
        run: python scripts/security_check.py

      - name: Run backend tests
        working-directory: backendPBL/projectBPL
        run: python manage.py test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Prepare database
        working-directory: backendPBL/projectBPL
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_DEBUG: "False"
        run: python manage.py migrate
      - name: Run E2E tests
        working-directory: frontend
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_DEBUG: "False"
          PLAYWRIGHT_API_URL: http://127.0.0.1:8000
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
        run: |
          python ../backendPBL/projectBPL/manage.py runserver 127.0.0.1:8000 &
          npm run preview -- --host 127.0.0.1 --port 4173 &
          python - <<'PY'
          import time
          import urllib.request
          import urllib.error

          def wait_for(url, timeout=60):
              deadline = time.time() + timeout
              last_error = None
              while time.time() < deadline:
                  try:
                      with urllib.request.urlopen(url, timeout=5) as response:
                          if 200 <= response.status < 500:
                              return
                  except urllib.error.HTTPError as exc:
                      if 200 <= exc.code < 500:
                          return
                      last_error = exc
                  except Exception as exc:
                      last_error = exc
                  time.sleep(1)
              raise SystemExit(f"Timed out waiting for {url}: {last_error}")

          wait_for("http://127.0.0.1:8000/api/account/register/learner/")
          wait_for("http://127.0.0.1:4173")
          PY
          npx playwright test

